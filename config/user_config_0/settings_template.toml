[settings]
sound_file = "/System/Library/Sounds/Ping.aiff"
alarm_interval = 5  # seconds between alarm repeats
max_alarm_duration = 300  # maximum alarm duration in seconds (5 minutes)
skip_days = ["sunday"]
language = "en"  # Language: "en" for English, "zh" for Chinese. Default is "en".

[time_blocks]
# time in minutes
pomodoro = 25
potato = 50
long_break = 40
meeting = 50

[time_points]
go_to_bed = "上床睡觉 😴 该休息了！"
summary_time = "今天的工作结束 🎉, 总结一下"
napping = "小憩时间到 😴, 休息一下吧！"
lunch_time = "午餐时间到 🍱！"
exercise = "运动时间到 🏃‍♂️！活动活动身体吧！"

[tasks]
daily_urgent = ["08:31", "14:01", "17:31", "21:31"]
ddl_urgent = ["08:32", "14:02", "17:32", "22:32"]
daily_summary = "23:35"
habit_prompt = "23:50"
weekly_review = "sunday 20:00"
monthly_review = "1 20:00"

[paths]
# Directory containing configuration files
config_dir = "config"

reports_path = "~/Desktop/reports"
